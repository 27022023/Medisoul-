<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medisoul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Luxury serif calligraphy font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Cinzel', serif;
      background: linear-gradient(180deg, #FFD6C9, #FFB3A1, #FF8A7A);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Title - MUCH bigger */
    .title {
      position: absolute;
      top: 38%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 6rem;
      color: #5A2A27;
      letter-spacing: 3px;
      font-weight: 700;
    }

    /* HUGE ⚕️ emoji */
    .snake-emoji {
      position: absolute;
      top: 62%;
      transform: translateY(-50%);
      font-size: 14rem;
      color: #5A2A27;
      opacity: 0.9;
    }

    /* Cross menu icon */
    .menu-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: #ffffffaa;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: 0.3s;
      z-index: 1000;
    }

    .menu-btn:hover {
      background: #ffffffdd;
    }

    .menu-btn span {
      font-size: 2.4rem;
      color: #5A2A27;
      font-weight: bold;
    }

    /* Slide-out menu (completely hidden by default) */
    .menu {
      position: fixed;
      top: 0;
      right: -300px;
      width: 300px;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 12px rgba(0,0,0,0.2);
      padding: 40px 20px;
      transition: 0.4s ease;
      font-family: 'Cinzel', serif;
      z-index: 999;
      display: flex;
      flex-direction: column;
    }

    .menu.open {
      right: 0;
    }

    .menu h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #5A2A27;
    }

    .menu a {
      display: block;
      margin: 20px 0;
      font-size: 1.4rem;
      color: #5A2A27;
      text-decoration: none;
      transition: 0.2s;
    }

    .menu a:hover {
      color: #FF6A5A;
      transform: translateX(6px);
    }

    /* Invisible overlay to close menu */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      display: none;
      z-index: 500;
    }

    .overlay.show {
      display: block;
    }
  </style>
</head>

<body>

  <!-- Invisible overlay -->
  <div class="overlay" id="overlay" onclick="closeMenu()"></div>

  <!-- Menu Button -->
  <div class="menu-btn" onclick="toggleMenu()">
    <span>✚</span>
  </div>

  <!-- Title -->
  <div class="title">Medisoul</div>

  <!-- HUGE ⚕️ symbol -->
  <div class="snake-emoji">⚕️</div>

  <!-- Slide-out Menu -->
  <div class="menu" id="menu">
    <h2>Menu</h2>
    <a href="#">Pharmacy</a>
    <a href="#">Self‑Care Suite</a>
    <a href="#">Workout Studio</a>
    <a href="#">Monthly Analytics</a>
  </div>

  <script>
    const menu = document.getElementById("menu");
    const overlay = document.getElementById("overlay");

    function toggleMenu() {
      menu.classList.toggle("open");
      overlay.classList.toggle("show");
    }

    function closeMenu() {
      menu.classList.remove("open");
      overlay.classList.remove("show");
    }
  </script>

</body>
</html>
