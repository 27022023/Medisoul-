<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medisoul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Luxury serif calligraphy font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Cinzel', serif;
      background: linear-gradient(180deg, #FFD6C9, #FFB3A1, #FF8A7A);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Title */
    .title {
      position: absolute;
      top: 42%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 4rem;
      color: #5A2A27;
      letter-spacing: 2px;
      font-weight: 600;
    }

    /* Classic Rod of Asclepius */
    .snake-symbol {
      position: absolute;
      top: 58%;
      transform: translateY(-50%);
      width: 120px;
      opacity: 0.9;
    }

    /* Cross menu icon */
    .menu-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      width: 40px;
      height: 40px;
      background: #ffffffaa;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: 0.3s;
    }

    .menu-btn:hover {
      background: #ffffffdd;
    }

    .menu-btn span {
      font-size: 2rem;
      color: #5A2A27;
      font-weight: bold;
    }

    /* Slide-out menu */
    .menu {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 12px rgba(0,0,0,0.2);
      padding: 40px 20px;
      transition: 0.4s ease;
      font-family: 'Cinzel', serif;
    }

    .menu.open {
      right: 0;
    }

    .menu h2 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #5A2A27;
    }

    .menu a {
      display: block;
      margin: 15px 0;
      font-size: 1.2rem;
      color: #5A2A27;
      text-decoration: none;
      transition: 0.2s;
    }

    .menu a:hover {
      color: #FF6A5A;
      transform: translateX(4px);
    }
  </style>
</head>

<body>

  <!-- Menu Button -->
  <div class="menu-btn" onclick="toggleMenu()">
    <span>✚</span>
  </div>

  <!-- Title -->
  <div class="title">Medisoul</div>

  <!-- Classic Rod of Asclepius Symbol (SVG) -->
  <img class="snake-symbol" src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Rod_of_Asclepius2.svg/1200px-Rod_of_Asclepius2.svg.png">

  <!-- Slide-out Menu -->
  <div class="menu" id="menu">
    <h2>Menu</h2>
    <a href="#">Pharmacy</a>
    <a href="#">Self‑Care Suite</a>
    <a href="#">Workout Studio</a>
    <a href="#">Monthly Analytics</a>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
    }
  </script>

</body>
</html>
